name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Install Playwright headless shell
        run: npx playwright install --with-deps --only-shell chromium

      - name: Web E2E
        run: npm run test:e2e:web

      - name: Validate hardened Compose deployment
        run: |
          npm run check:compose
          npm run check:compose:host

      - name: Build web container smoke image
        run: docker build --secret id=github_token,env=GITHUB_TOKEN -t containerlab-web:smoke .

      - name: Smoke test hardened web container
        run: npm run test:image -- containerlab-web:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: containerlab-app-playwright-report-${{ github.run_number }}
          path: apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 30
