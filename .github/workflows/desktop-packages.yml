name: Desktop packages

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  NODE_VERSION: "24"

jobs:
  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux package tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build desktop packages
        run: npm run package:desktop:linux

      - name: Verify Linux artifacts
        run: |
          test -n "$(find apps/desktop/release -maxdepth 1 -name '*.AppImage' -print -quit)"
          test -n "$(find apps/desktop/release -maxdepth 1 -name '*.deb' -print -quit)"
          test -n "$(find apps/desktop/release -maxdepth 1 -name '*.rpm' -print -quit)"

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          if-no-files-found: error
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build desktop installer
        run: npm run package:desktop:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify Windows artifact
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path apps/desktop/release -Filter *.exe
          if (-not $installer) {
            throw "No Windows installer was produced"
          }

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          if-no-files-found: error
          path: apps/desktop/release/*.exe

  build-macos:
    name: Build macOS package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build desktop package
        run: npm run package:desktop:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify macOS artifact
        run: |
          test -n "$(find apps/desktop/release -maxdepth 1 -name '*.dmg' -print -quit)"

      - name: Upload macOS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          if-no-files-found: error
          path: apps/desktop/release/*.dmg

  publish-release:
    name: Publish release assets
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish desktop packages
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t artifacts < <(find release-assets -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.exe' \) -print)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No desktop package artifacts found" >&2
            exit 1
          fi

          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Containerlab desktop package artifacts for $GITHUB_REF_NAME."
          fi

          gh release upload "$GITHUB_REF_NAME" "${artifacts[@]}" --clobber
